<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>VTube</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;height:100vh}
#wrap{position:relative;width:100vw;height:100vh;background:#1a1a2e;overflow:hidden}
canvas{width:100%!important;height:100%!important;display:block}
#status{position:absolute;top:36px;left:10px;color:#888;font:13px/1.3 sans-serif;background:transparent;padding:2px 6px;z-index:10;pointer-events:none}
#error{position:absolute;top:20px;left:50%;transform:translateX(-50%);color:#f44;font:13px/1.4 sans-serif;background:#100;padding:8px 16px;border-radius:8px;z-index:10;display:none;max-width:80vw;word-break:break-word}
#camBtn{position:absolute;top:10px;left:10px;z-index:20;padding:6px 12px;font:12px sans-serif;background:#333;color:#fff;border:none;border-radius:6px;cursor:pointer;user-select:none}
#camBtn:active{background:#555}
#camBox{position:absolute;top:10px;right:10px;z-index:25;width:240px;border-radius:6px;overflow:hidden;border:1px solid #4a6cf7;display:none}
#camBox video{width:100%;display:block;transform:scaleX(-1)}
#camBox canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;transform:scaleX(-1)}
@media(max-width:480px){
  #camBox{width:160px}
  #status{font:14px/1.3 sans-serif;padding:5px 10px}
  #camBtn{font:11px;padding:5px 10px}
  #ctrl{max-width:90vw;gap:4px;padding:5px 6px;transform:translateX(-50%) !important;left:50%;max-height:80vh;overflow-y:auto}
  #ctrlContent{flex-wrap:wrap;justify-content:center;gap:4px}
  #ctrl input[type=range]{width:60px}
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <canvas id="c3d" style="display:none"></canvas>
  <div id="status">로딩 중...</div>
  <div id="error"></div>
  <button id="camBtn">CAM ON</button>
  <select id="modelSel" style="position:absolute;top:10px;left:78px;z-index:20;padding:4px 6px;font:11px sans-serif;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer;outline:none;height:28px"></select>
  <button id="ctrlShowBtn" style="position:absolute;top:10px;left:132px;z-index:30;padding:4px 6px;font:11px sans-serif;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer;height:28px;line-height:18px;width:50px" onclick="var c=document.getElementById('ctrl');c.style.display=c.style.display==='none'?'flex':'none'" title="Ctrl 표시">panel</button>
  <input type="range" id="ctrlYSlider" min="10" max="95" value="95" style="position:absolute;top:42px;left:132px;z-index:30;width:50px;height:3px;accent-color:#4a6cf7;margin:0;padding:0;appearance:none;background:rgba(255,255,255,0.15);border-radius:2px;outline:none">
  <button id="modeBtn" style="position:absolute;top:10px;left:228px;z-index:20;padding:6px 12px;font:12px sans-serif;background:#555;color:#fff;border:none;border-radius:6px;cursor:pointer">3D</button>
  <button id="vtsBtn" style="display:none;position:absolute;top:10px;left:270px;z-index:20;padding:6px 12px;font:12px sans-serif;background:#555;color:#fff;border:none;border-radius:6px;cursor:pointer">VTS</button>
  <button id="boxToggle" style="display:none;position:absolute;top:10px;left:312px;z-index:20;padding:6px 12px;font:12px sans-serif;background:#333;color:#fff;border:none;border-radius:6px;cursor:pointer;user-select:none">박스 OFF</button>
  <div id="ctrl" style="position:absolute;bottom:60px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:10px;align-items:center;background:rgba(0,0,0,0.5);padding:6px 14px;border-radius:8px">
   <div id="ctrlContent" style="display:flex;gap:10px;align-items:center">
    <span style="color:#888;font:11px sans-serif">크기</span>
    <input type="range" id="sizeSlider" min="2" max="80" value="18" style="width:100px;height:4px;accent-color:#4a6cf7">
    <span id="sizeVal" style="color:#fff;font:11px sans-serif;min-width:28px;text-align:right">18</span>
    <span style="color:#888;font:11px sans-serif;margin-left:6px">Y</span>
    <input type="range" id="ySlider" min="-80" max="300" value="0" style="width:100px;height:4px;accent-color:#4a6cf7">
    <span id="yVal" style="color:#fff;font:11px sans-serif;min-width:28px;text-align:right">0</span>
    <button id="flipBtn" style="padding:4px 10px;font:11px sans-serif;background:#555;color:#fff;border:none;border-radius:5px;cursor:pointer">반전</button>
    <button id="overlayBtn" style="padding:4px 10px;font:11px sans-serif;background:#4a6cf7;color:#fff;border:none;border-radius:5px;cursor:pointer">오버레이</button>
    <button id="faceToggle" style="padding:4px 10px;font:11px sans-serif;background:#4a6cf7;color:#fff;border:none;border-radius:5px;cursor:pointer">얼굴</button>
    <button id="handToggle" style="padding:4px 10px;font:11px sans-serif;background:#4a6cf7;color:#fff;border:none;border-radius:5px;cursor:pointer">손</button>
    <button id="micBtn" style="padding:4px 10px;font:11px sans-serif;background:#555;color:#aaa;border:none;border-radius:5px;cursor:pointer">MIC</button>
    <button id="rvcBtn" style="padding:4px 10px;font:11px sans-serif;background:#555;color:#aaa;border:none;border-radius:5px;cursor:pointer;display:none" title="RVC 음성 변환">RVC OFF</button>
    <button id="rvcSetBtn" style="padding:4px 6px;font:10px sans-serif;background:#333;color:#888;border:none;border-radius:4px;cursor:pointer;display:none" title="RVC 설정">⚙</button>
    <span id="rvcStatus" style="color:#888;font:10px sans-serif;display:none"></span>
    <div id="rvcSettings" style="display:none;position:absolute;bottom:105px;left:50%;transform:translateX(-50%);z-index:30;flex-wrap:wrap;gap:4px 10px;background:rgba(0,0,0,0.7);padding:8px 12px;border-radius:8px;width:360px;font:10px sans-serif;justify-content:center">
      <label style="color:#aaa">음조 <span id="rvcPitchVal">0</span></label>
      <input type="range" min="-12" max="12" value="0" step="1" style="width:80px;height:3px;accent-color:#4a6cf7" oninput="rvcSendSetting('pitch',+this.value);document.getElementById('rvcPitchVal').textContent=this.value">
      <label style="color:#aaa">임계 <span id="rvcThreshVal">0.01</span></label>
      <input type="range" min="0" max="0.1" value="0.01" step="0.005" style="width:80px;height:3px;accent-color:#4a6cf7" oninput="rvcSendSetting('responseThreshold',+this.value);document.getElementById('rvcThreshVal').textContent=this.value">
      <label style="color:#aaa">샘플 <span id="rvcSamLen">100</span></label>
      <input type="range" min="1" max="100" value="100" step="1" style="width:80px;height:3px;accent-color:#4a6cf7" oninput="rvcSendSetting('sampleLen',+this.value);document.getElementById('rvcSamLen').textContent=this.value">
      <label style="color:#aaa">추론 <span id="rvcExtra">0</span></label>
      <input type="range" min="0" max="500" value="0" step="10" style="width:80px;height:3px;accent-color:#4a6cf7" oninput="rvcSendSetting('extraTime',+this.value);document.getElementById('rvcExtra').textContent=this.value">
      <label style="color:#aaa"><input type="checkbox" checked onchange="rvcSendSetting('inputNR',this.checked)"> 입력잡음↓</label>
      <label style="color:#aaa"><input type="checkbox" checked onchange="rvcSendSetting('outputNR',this.checked)"> 출력잡음↓</label>
      <label style="color:#aaa">인덱스 <span id="rvcIdxVal">0.5</span></label>
      <input type="range" min="0" max="1" value="0.5" step="0.05" style="width:80px;height:3px;accent-color:#4a6cf7" oninput="rvcSendSetting('indexRate',+this.value);document.getElementById('rvcIdxVal').textContent=this.value">
    </div>
    <select id="voiceSel" style="display:none;padding:3px 6px;font:10px sans-serif;background:#333;color:#fff;border:none;border-radius:4px;cursor:pointer;outline:none"></select>
    <canvas id="waveCanvas" width="80" height="24" style="display:none;border-radius:4px;background:rgba(0,0,0,0.4)"></canvas>
    <span id="volLabel" style="display:none;color:#888;font:10px sans-serif">볼륨</span>
    <input type="range" id="volSlider" min="0" max="200" value="100" style="display:none;width:60px;height:4px;accent-color:#4a6cf7">
  </div>
</div>
  <div id="camBox"><video id="cam" autoplay playsinline></video><canvas id="ov"></canvas></div>
</div>

<!-- Libs -->
<script src="/lib/pixi.min.js"></script>
<script>
window.process = {env:{NODE_ENV:'production'},argv:[],on:function(){},versions:{node:''}};
</script>
<script src="/lib/live2dcubismcore.min.js"></script>
<script src="/lib/cubism4.min.js"></script>

<!-- Three.js (via importmap) -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@0.7.0/lib/three-vrm.module.js",
    "@pixiv/three-vrm/": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@0.7.0/lib/"
  }
}
</script>
<script type="module" src="/js/mmd-loader.js"></script>

<!-- App modules (order matters) -->
<script src="/js/state.js"></script>
<script src="/js/vts-ws.js"></script>
<script src="/js/cubism-core.js"></script>
<script src="/js/main.js"></script>
<script src="/js/ui-controls.js"></script>
<script src="/js/tracking.js"></script>
<script src="/js/voice-changer.js"></script>
<script src="/js/rvc-web.js?v=2"></script>

</body>
</html>
