<script type="module">
import * as THREE from 'three';
import { MMDLoader } from 'three/addons/animation/MMDLoader.js';
import { MMDPhysics } from 'three/addons/animation/MMDPhysics.js';
import { CCDIKSolver } from 'three/addons/animation/CCDIKSolver.js';

let mmdRenderer, mmdScene, mmdCamera, mmdModel, mmdMixer, mmdPhysics, mmdSolver;
let mmdAnimId = null;

export function initMMD(canvas) {
  mmdRenderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  mmdRenderer.setPixelRatio(devicePixelRatio || 1);
  mmdRenderer.setClearColor(0x000000, 0);
  mmdRenderer.shadowMap.enabled = false;
  mmdRenderer.outputColorSpace = THREE.SRGBColorSpace;

  mmdScene = new THREE.Scene();
  mmdScene.background = null;

  // lighting
  const amb = new THREE.AmbientLight(0xffffff, 0.6);
  mmdScene.add(amb);
  const dir = new THREE.DirectionalLight(0xffffff, 0.8);
  dir.position.set(1, 1, 1);
  mmdScene.add(dir);
  const rim = new THREE.DirectionalLight(0x88aaff, 0.4);
  rim.position.set(-1, 0.5, 1);
  mmdScene.add(rim);

  mmdCamera = new THREE.PerspectiveCamera(35, 1, 1, 100);
  mmdCamera.position.set(0, 10, 28);
  mmdCamera.lookAt(0, 10, 0);
}

export function loadMMDModel(url) {
  if (mmdModel) {
    mmdScene.remove(mmdModel);
    if (mmdPhysics) mmdPhysics.dispose();
    mmdModel = null; mmdPhysics = null; mmdSolver = null; mmdMixer = null;
  }
  const loader = new MMDLoader();
  loader.load(url, (result) => {
    mmdModel = result.mesh;
    const anim = result.animation || null;
    mmdModel.position.set(0, 5, 0);
    mmdModel.scale.set(1, 1, 1);
    mmdScene.add(mmdModel);

    if (anim) {
      mmdMixer = new THREE.AnimationMixer(mmdModel);
      mmdMixer.clipAction(anim).play();
    }

    mmdSolver = new CCDIKSolver(mmdModel, result.ikBones);
    mmdPhysics = new MMDPhysics(mmdModel, { unitStep: true });
  }, undefined, (err) => { console.error('MMD load error:', err); });
}

function mmdLoop(width, height) {
  if (!mmdRenderer || !mmdModel) return;
  mmdRenderer.setSize(width, height, false);

  // apply face tracking
  if (mmdModel && window.__mmdFace) {
    const f = window.__mmdFace;
    const bones = mmdModel.skeleton?.bones;
    if (bones) {
      // head bone
      const headBone = bones.find(b => b.name?.includes('頭') || b.name === 'head');
      if (headBone) {
        headBone.rotation.x = f.pitch || 0;
        headBone.rotation.y = f.yaw || 0;
      }
    }
  }

  if (mmdSolver) mmdSolver.update();
  if (mmdPhysics) mmdPhysics.update();
  if (mmdMixer) mmdMixer.update(1/60);

  mmdRenderer.render(mmdScene, mmdCamera);
  mmdAnimId = requestAnimationFrame(() => mmdLoop(width, height));
}

export function resizeMMD(w, h) {
  if (mmdRenderer) {
    mmdRenderer.setSize(w, h, false);
    if (mmdCamera) {
      mmdCamera.aspect = w / h;
      mmdCamera.updateProjectionMatrix();
    }
  }
}

export function destroyMMD() {
  if (mmdAnimId) cancelAnimationFrame(mmdAnimId);
  if (mmdPhysics) mmdPhysics.dispose();
  if (mmdRenderer) {
    mmdRenderer.dispose();
    mmdRenderer = null;
  }
  mmdModel = null; mmdPhysics = null; mmdSolver = null; mmdMixer = null;
  mmdScene = null; mmdCamera = null;
}

// Expose for main script
window.__mmd = { initMMD, loadMMDModel, resizeMMD, destroyMMD, mmdLoop };
</script>
<script>
(function(){
const $ = id => document.getElementById(id);
const statusEl = $('status'), errEl = $('error'), camBtn = $('camBtn');
const setStatus = t => { statusEl.textContent = t; }; window._setStatus = setStatus;
const setError = m => { errEl.style.display='block'; errEl.textContent=m; }; window._setError = setError;

let app, faceLandmarker, currentModel, stream, headX = 0, headY = 0, rawX = 0, rawY = 0, trackingLoop = null, boxVisible = true;
let mouthOpen = 0, eyeLOpen = 1, eyeROpen = 1, blinkTimer = 0, flipX = false, overlayShow = true, faceOn = true, handOn = true;
let handwearImg = null;
let handData = []; // list of {landmarks:[21], worldLandmarks:[21], handedness:'Left'|'Right'} per detected hand
// arm state from hands
let armL = { open:0, wx:0, wy:0 }, armR = { open:0, wx:0, wy:0 };
const _arm = { armL, armR };
window.__debug = _arm;
const MODELS = [
  { path: '/models/20250913/20250913.model3.json', label: 'Hand', anchor: [0.5, 0.5], scale: 0.24 },
  { path: '/models/huohuo/huohuo.model3.json', label: 'Huohuo', anchor: [0.5, 0.45], scale: 0.2 },

  { path: '/models/Mao/Mao.model3.json', label: 'Mao', anchor: [0.5, 0.35], scale: 0.18 },
  { path: '/models/Frieren/Frieren.model3.json', label: 'Frieren', anchor: [0.5, 0.45], scale: 0.2 },
  { path: '/models/Hiyori/Hiyori.model3.json', label: 'Hiyori', anchor: [0.5, 0.15], scale: 0.22 },
  // Rice removed
];
let modelIdx = 0;

async function loadModel(cfg) {
  if (currentModel) { app.stage.removeChild(currentModel); currentModel.destroy(true); }
  setStatus('모델 로딩... '+cfg.label);
  const m = await PIXI.live2d.Live2DModel.from(cfg.path);
  m.anchor.set(cfg.anchor[0], cfg.anchor[1]);
  m.scale.set(cfg.scale);
  m.interactive = false;
  m.position.set(app.screen.width/2, app.screen.height * 0.2);
  app.stage.addChild(m);

  await new Promise(r => { if (m.internalModel) return r(); m.once('modelLoaded', r); });

  const im = m.internalModel;
  // wait for coreModel to be available
  for (let i = 0; i < 20; i++) {
    if (im && im.coreModel && im.coreModel._model) break;
    await new Promise(r => setTimeout(r, 50));
  }
  if (!im || !im.coreModel || !im.coreModel._model) { throw new Error('coreModel not ready'); }
  const pVals = im.coreModel._model.parameters.values;
  const pIds = im.coreModel._model.parameters.ids;

  // cache ALL param indices (any language)
  const idx = {};
  for (let i = 0; i < pIds.length; i++) {
    idx[pIds[i]] = i;
  }
  m._paramIdx = idx;
  // Frieren fix: force multiply/screen colors neutral + disable mask
  const isFrieren = cfg.label === 'Frieren';
  if (isFrieren && im && im.coreModel && im.coreModel._model) {
    const dc = im.coreModel._model.drawables;
    if (dc && dc.multiplyColors && dc.screenColors) {
      for (let di = 0; di < dc.count; di++) {
        dc.multiplyColors[di*4] = 1;
        dc.multiplyColors[di*4+1] = 1;
        dc.multiplyColors[di*4+2] = 1;
        dc.multiplyColors[di*4+3] = 1;
        dc.screenColors[di*4] = 0;
        dc.screenColors[di*4+1] = 0;
        dc.screenColors[di*4+2] = 0;
        dc.screenColors[di*4+3] = 0;
      }
    }
    // force all part opacities to 1
    if (im.coreModel._model.parts && im.coreModel._model.parts.opacities) {
      for (let pi = 0; pi < im.coreModel._model.parts.opacities.length; pi++)
        im.coreModel._model.parts.opacities[pi] = 1;
    }
    // disable high precision mask
    if (im.renderer && im.renderer.useHighPrecisionMask)
      im.renderer.useHighPrecisionMask(false);
  }
  // force VTS hand tracking overlay visible
  const pts = im.coreModel._model.parts;
  if (pts && pts.ids) {
    for (let pi2 = 0; pi2 < pts.ids.length; pi2++) {
      const pid2 = pts.ids[pi2];
      if (pid2 === 'Part70' || pid2 === 'Part59' || pid2 === 'Part48') {
        pts.opacities[pi2] = 1.0;
        console.log('FORCE PART OPACITY 1.0:', pid2);
      }
    }
  }
  // apply hand tracking expression (hide normal arms, show hand overlay)
  // (values controlled dynamically in tracking loop: 0 when no hand, 30 when hand detected)
  if (idx.Param15 >= 0) pVals[idx.Param15] = 0.0;
  if (idx.Param21 >= 0) pVals[idx.Param21] = 0.0;
  // arm param ranges for active model
  if (!window.__armPv) window.__armPv = {};
  const mins = im.coreModel._model.parameters.minimumValues;
  const maxs = im.coreModel._model.parameters.maximumValues;
  for (const key of Object.keys(idx)) {
    if (key.includes('Arm') || key.includes('Hand') || key.includes('Shoulder'))
      console.log(key, 'range:', mins[idx[key]].toFixed(1), '~', maxs[idx[key]].toFixed(1));
  }

  if (im.motionManager) { im.motionManager.updateParameters = () => {}; im.motionManager.startMotionPriority = () => {}; }
  if (im.mainMotionManager) im.mainMotionManager.stopAll();
  if (im.expressionManager) im.expressionManager.stopAll();
  if (im.breath) { im.breath.def = () => 0; im.breath.running = false; }
  if (im.eyeBlink) { im.eyeBlink.def = () => 0; im.eyeBlink.running = false; }
  if (im.physicsManager) im.physicsManager.update = () => {};

  const fc = im.focusController;
  if (fc) { fc.x = 0; fc.y = 0; fc.targetX = 0; fc.targetY = 0; fc.vx = 0; fc.vy = 0; fc.enabled = false; }
  if (m.focus) m.focus = () => {};

  const origUpdate = im.update;
  const pi = idx;
  const pv = pVals;
  im.update = function() {
    if (pi.ParamAngleX >= 0) pv[pi.ParamAngleX] = headX * 68;
    if (pi.ParamAngleY >= 0) pv[pi.ParamAngleY] = headY * 114;
    if (pi.ParamBodyAngleX >= 0) pv[pi.ParamBodyAngleX] = headX * Math.abs(headX) * 80;
    if (pi.ParamBodyAngleY >= 0) pv[pi.ParamBodyAngleY] = headY * Math.abs(headY) * 100;
    if (pi.ParamMouthOpenY >= 0) pv[pi.ParamMouthOpenY] = mouthOpen;
    if (pi.ParamA >= 0) pv[pi.ParamA] = mouthOpen;
    if (pi.ParamEyeLOpen >= 0) pv[pi.ParamEyeLOpen] = eyeLOpen;
    if (pi.ParamEyeROpen >= 0) pv[pi.ParamEyeROpen] = eyeROpen;
    // auto blink every 2-5 seconds
    blinkTimer++;
    if (blinkTimer > 120 + Math.random() * 180) {
      const blinkPhase = Math.min(1, (blinkTimer - 120) / 6);
      const bk = blinkPhase < 0.5 ? blinkPhase * 2 : (1 - blinkPhase) * 2;
      const blinkVal = 1 - Math.max(0, bk) * 0.9;
      if (pi.ParamEyeLOpen >= 0) pv[pi.ParamEyeLOpen] = Math.min(eyeLOpen, blinkVal);
      if (pi.ParamEyeROpen >= 0) pv[pi.ParamEyeROpen] = Math.min(eyeROpen, blinkVal);
      if (blinkPhase >= 1) blinkTimer = 0;
    }
    // ── arm from hand ──
    // right arm (detailed - Hiyori style)
    if (pi.ParamRightShoulderUp >= 0) pv[pi.ParamRightShoulderUp] = -armR.wy * 10;
    if (pi.ParamArmRA01 >= 0) pv[pi.ParamArmRA01] = -armR.wy * 20;       // -10~30
    if (pi.ParamArmRA02 >= 0) pv[pi.ParamArmRA02] = -armR.wx * 15;       // -20~10
    if (pi.ParamArmRA03 >= 0) pv[pi.ParamArmRA03] = armR.open * 30;      // -30~30
    if (pi.ParamArmRB01 >= 0) pv[pi.ParamArmRB01] = armR.wy * 20;        // -30~30
    if (pi.ParamArmRB02 >= 0) pv[pi.ParamArmRB02] = -armR.wx * 20;       // -30~30
    if (pi.ParamArmRB02Y !== undefined && pi.ParamArmRB02Y >= 0) pv[pi.ParamArmRB02Y] = armR.wy < 0 ? -armR.wy * 20 : 0;  // 0~30
    if (pi.ParamArmRB03 >= 0) pv[pi.ParamArmRB03] = armR.open * 15;      // -20~20
    // right arm (simple - Mao style)
    if (pi.ParamArmRA >= 0) pv[pi.ParamArmRA] = -armR.wy * 10;           // -10~10
    if (pi.ParamArmRB >= 0) pv[pi.ParamArmRB] = armR.wx * 10;           // -10~10
    if (pi.ParamHandR >= 0) pv[pi.ParamHandR] = armR.open;               // -1~1
    // right hand
    if (pi.ParamHandRA >= 0) pv[pi.ParamHandRA] = (1 - armR.open) * -10; // -10~0
    if (pi.ParamHandRB >= 0) pv[pi.ParamHandRB] = armR.open * 10;        // -10~10
    // left arm (detailed - Hiyori style)
    if (pi.ParamLeftShoulderUp >= 0) pv[pi.ParamLeftShoulderUp] = -armL.wy * 10;
    if (pi.ParamArmLA01 >= 0) pv[pi.ParamArmLA01] = -armL.wy * 20;       // -10~30
    if (pi.ParamArmLA02 >= 0) pv[pi.ParamArmLA02] = armL.wx * 15;       // -20~10
    if (pi.ParamArmLA03 >= 0) pv[pi.ParamArmLA03] = armL.open * 30;      // -30~30
    if (pi.ParamArmLB01 >= 0) pv[pi.ParamArmLB01] = armL.wy * 20;        // -30~30
    if (pi.ParamArmLB02 >= 0) pv[pi.ParamArmLB02] = armL.wx * 20;       // -30~30
    if (pi.ParamArmLB03 >= 0) pv[pi.ParamArmLB03] = armL.open * 10;      // -30~10
    // left arm (simple - Mao style)
    if (pi.ParamArmLA >= 0) pv[pi.ParamArmLA] = -armL.wy * 10;
    if (pi.ParamArmLB >= 0) pv[pi.ParamArmLB] = -armL.wx * 10;
    if (pi.ParamHandL >= 0) pv[pi.ParamHandL] = armL.open;
    // left hand
    if (pi.ParamHandLA >= 0) pv[pi.ParamHandLA] = (1 - armL.open) * -10; // -10~0
    if (pi.ParamHandLB >= 0) pv[pi.ParamHandLB] = armL.open * 10;        // -10~10
    // ── Natori arm group A ──
    if (pi.ParamArmAR01 >= 0) pv[pi.ParamArmAR01] = -armR.wy * 20;       // -10~30
    if (pi.ParamArmAR02 >= 0) pv[pi.ParamArmAR02] = -armR.wx * 15;       // -40~10
    if (pi.ParamArmAR03 >= 0) pv[pi.ParamArmAR03] = armR.open * 20;      // -30~30
    if (pi.ParamArmAR04 >= 0) pv[pi.ParamArmAR04] = (1 - armR.open) * -1; // -1~0
    if (pi.ParamArmAL01 >= 0) pv[pi.ParamArmAL01] = -armL.wy * 20;       // -10~30
    if (pi.ParamArmAL02 >= 0) pv[pi.ParamArmAL02] = armL.wx * 15;        // -40~10
    if (pi.ParamArmAL03 >= 0) pv[pi.ParamArmAL03] = armL.open * 20;      // -30~30
    if (pi.ParamArmAL04 >= 0) pv[pi.ParamArmAL04] = (1 - armL.open) * -1; // -1~0
    // ── VTS hand tracking ──
    if (pi.handLeftOpen >= 0) pv[pi.handLeftOpen] = (armL.open * 60) - 30;
    if (pi.HandLeftAngleX >= 0) pv[pi.HandLeftAngleX] = armL.wy * 30;
    if (pi.HandLeftAngleZ >= 0) pv[pi.HandLeftAngleZ] = armL.wx * 30;
    if (pi.HandLeftPositionX >= 0) pv[pi.HandLeftPositionX] = armL.wx * 0.5;
    if (pi.HandLeftPositionY >= 0) pv[pi.HandLeftPositionY] = armL.wy * 0.5;
    if (pi.HandRightAngleX >= 0) pv[pi.HandRightAngleX] = armR.wy * 30;
    if (pi.HandRightAngleZ >= 0) pv[pi.HandRightAngleZ] = armR.wx * 30;
    if (pi.HandRightPositionX >= 0) pv[pi.HandRightPositionX] = armR.wx * 0.5;
    if (pi.HandRightPositionY >= 0) pv[pi.HandRightPositionY] = armR.wy * 0.5;
    // ── hand model arm params (20250913) ──
    // Arm skeleton (Param5/6/16/17/18) — only enable wrist joints (17/18), skip full arm (5/6/16)
    // if (pi.Param5 >= 0) pv[pi.Param5] = -armR.wy * 10;               // arm1
    // if (pi.Param6 >= 0) pv[pi.Param6] = -armR.wx * 10;               // arm2
    if (pi.Param7 >= 0) pv[pi.Param7] = -armL.wy * 10;               // arm3
    // if (pi.Param16 >= 0) pv[pi.Param16] = -armR.wx * 15;             // armR2
    if (pi.Param17 >= 0) pv[pi.Param17] = -armR.wy * 8;               // armUpRX — wrist tilt
    // Param18 (armRZ) handled by tracking loop with hand roll
    if (pi.Param19 >= 0) pv[pi.Param19] = armL.wx * 15;              // armZ2
    // debug: snapshot arm params
    if (!window.__armPv) window.__armPv = {};
    for (const k of Object.keys(pi)) {
      if (k.includes('Arm') || k.includes('Hand') || k.includes('Shoulder'))
        window.__armPv[k] = pv[pi[k]];
    }
    return origUpdate.apply(this, arguments);
  };

  currentModel = m;
  window.__m = m;  // expose for debug
  $('modelSel').value = '' + modelIdx;
  return m;
}

async function init() {
  if (!window.PIXI) return setError('PIXI 없음');
  if (!window.Live2DCubismCore) return setError('Core 없음');
  if (!window.PIXI.live2d || !window.PIXI.live2d.Live2DModel) return setError('live2d 없음');
  setStatus('로딩...');

  app = new PIXI.Application({
    view: $('c'),
    width: window.innerWidth, height: window.innerHeight,
    backgroundColor: 0x1a1a2e, antialias: true,
    resolution: devicePixelRatio||1, autoDensity: true,
    resizeTo: $('wrap'),
    premultipliedAlpha: true
  });
  // force WebGL state reset after Live2D draw — fixes black silhouettes
  const __origRender = PIXI.live2d.Live2DModel.prototype._render;
  PIXI.live2d.Live2DModel.prototype._render = function(r) {
    __origRender.call(this, r);
    const g = r.gl;
    g.blendFunc(g.ONE, g.ONE_MINUS_SRC_ALPHA);
    g.disable(g.BLEND);
    g.useProgram(null);
    g.bindTexture(g.TEXTURE_2D, null);
    g.activeTexture(g.TEXTURE0);
    r.state.reset();
    r.texture.reset();
  };

  setStatus('FaceMesh 로딩...');

  // ── load MediaPipe ──
  const mod = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.17/vision_bundle.mjs');
  const vision = await mod.FilesetResolver.forVisionTasks('/lib/mediapipe/');
  faceLandmarker = await mod.FaceLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: '/lib/mediapipe/face_landmarker.task' },
    runningMode: 'VIDEO', numFaces: 1,
    minFaceDetectionConfidence: 0.5, minTrackingConfidence: 0.5
  });
  handLandmarker = await mod.HandLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: '/lib/mediapipe/hand_landmarker.task' },
    runningMode: 'VIDEO', numHands: 2,
    minHandDetectionConfidence: 0.3, minTrackingConfidence: 0.3
  });

  setStatus('준비 완료');

  // ── load first model ──
  await loadModel(MODELS[0]);
  setStatus('준비 완료');

  // ── VTS WebSocket ──
  let vtsWs = null, vtsToken = null, vtsAuthed = false, vtsConnecting = false;
  function vtsConnect() {
    if (vtsWs || vtsConnecting) return;
    vtsConnecting = true;
    try {
      const ws = new WebSocket('wss://' + location.host + '/vts/');
      ws.onopen = () => {
        vtsWs = ws; vtsConnecting = false;
        setStatus('VTS 연결됨');
        ws.send(JSON.stringify({
          apiName: 'VTubeStudioPublicAPI', apiVersion: '1.0',
          requestID: 'auth', messageType: 'AuthenticationRequest',
          data: { pluginName: 'HermesVTube', pluginDeveloper: 'user',
            authenticationToken: vtsToken || '' }
        }));
      };
      ws.onmessage = e => {
        try {
          const r = JSON.parse(e.data);
          if (r.messageType === 'AuthenticationResponse') {
            if (r.data.authenticated) {
              vtsAuthed = true; vtsToken = r.data.authenticationToken;
              setStatus('VTS 인증됨');
            } else if (r.data.authenticationToken) {
              vtsToken = r.data.authenticationToken;
              setStatus('VTS: 토큰 입력 필요');
            }
          }
        } catch(e2) {}
      };
      ws.onclose = () => { vtsWs = null; vtsAuthed = false; vtsConnecting = false; };
      ws.onerror = () => { vtsWs = null; vtsAuthed = false; vtsConnecting = false; };
    } catch(e) { vtsConnecting = false; }
  }
  // VTS param inject helper
  const vtsInject = (paramValues) => {
    if (!vtsWs || !vtsAuthed) return;
    vtsWs.send(JSON.stringify({
      apiName: 'VTubeStudioPublicAPI', apiVersion: '1.0',
      requestID: 'param' + Date.now(), messageType: 'InjectParameterDataRequest',
      data: { parameterValues: paramValues, setValue: false }
    }));
  };
  window.__vtsConnect = vtsConnect;
  window.__vtsInject = vtsInject;
  // try connect VTS on load
  setTimeout(vtsConnect, 2000);

  // populate model dropdown
  const sel = $('modelSel');
  MODELS.forEach((m,i) => { sel.innerHTML += `<option value="${i}">${m.label}</option>`; });
  sel.value = '0';
  // ── model switch ──
  sel.onchange = async () => {
    if (stream) return;
    modelIdx = parseInt(sel.value);
    await loadModel(MODELS[modelIdx]);
    $('sizeSlider').value = Math.round(currentModel.scale.x * 100);
    $('sizeVal').textContent = Math.round(currentModel.scale.x * 100);
    $('ySlider').value = 0;
    $('yVal').textContent = '0';
    setStatus('준비 완료');
  };

  // ── size slider ──
  $('sizeSlider').oninput = () => {
    if (!currentModel) return;
    const v = $('sizeSlider').value / 100;
    currentModel.scale.set(v);
    $('sizeVal').textContent = $('sizeSlider').value;
  };

  // ── Y position slider ──
  $('ySlider').oninput = () => {
    if (!currentModel) return;
    const val = +$('ySlider').value;
    currentModel.position.y = app.screen.height * 0.2 + val * 4;
    $('yVal').textContent = val;
  };

  // ── MMD mode toggle ──
  let mmdMode = false;
  const mmdCanvas = $('c3d');
  const liveCanvas = $('c');
  $('modeBtn').onclick = async () => {
    mmdMode = !mmdMode;
    $('modeBtn').style.background = mmdMode ? '#4a6cf7' : '#555';
    $('modeBtn').textContent = mmdMode ? 'Live2D' : '3D';
    if (mmdMode) {
      liveCanvas.style.display = 'none';
      mmdCanvas.style.display = 'block';
      const wrap = $('wrap');
      mmdCanvas.width = wrap.clientWidth;
      mmdCanvas.height = wrap.clientHeight;
      if (!window.__mmd._initialized) {
        window.__mmd.initMMD(mmdCanvas);
        window.__mmd._initialized = true;
      }
      window.__mmd.resizeMMD(mmdCanvas.width, mmdCanvas.height);
      // check for MMD models
      fetch('/models/mmd/list.json').then(r => {
        if (!r.ok) { setStatus('MMD: /models/mmd 에 .pmx 파일을 넣으세요'); return; }
        r.json().then(list => {
          if (list.length > 0) {
            window.__mmd.loadMMDModel('/models/mmd/' + list[0]);
            window.__mmd.mmdLoop(mmdCanvas.width, mmdCanvas.height);
            setStatus('3D 모드 / ' + list[0]);
          } else {
            setStatus('MMD: .pmx 파일 필요 (models/mmd/)');
          }
        });
      }).catch(() => {
        setStatus('MMD: /models/mmd/ 에 .pmx 파일 필요');
      });
      $('ctrl').style.display = 'none';
      $('modelSel').style.display = 'none';
    } else {
      mmdCanvas.style.display = 'none';
      liveCanvas.style.display = 'block';
      if (window.__mmd.destroyMMD) window.__mmd.destroyMMD();
      window.__mmd._initialized = false;
      $('ctrl').style.display = '';
      $('modelSel').style.display = '';
      setStatus('Live2D 모드');
    }
  };

  // ── MMD file upload trigger ──
  const mmdUpload = document.createElement('input');
  mmdUpload.type = 'file';
  mmdUpload.accept = '.pmx,.pmd,.vmd';
  mmdUpload.style.display = 'none';
  mmdUpload.onchange = async () => {
    const file = mmdUpload.files[0];
    if (!file || !file.name.match(/\.(pmx|pmd|vmd)$/i)) return;
    const form = new FormData();
    form.append('file', file);
    form.append('filename', file.name);
    try {
      const r = await fetch('/upload-mmd', { method: 'POST', body: form });
      const j = await r.json();
      if (j.ok) {
        setStatus('업로드 완료: ' + file.name);
        if (mmdMode && file.name.match(/\.(pmx|pmd)$/i)) {
          window.__mmd.loadMMDModel('/models/mmd/' + file.name);
          window.__mmd.mmdLoop(mmdCanvas.width, mmdCanvas.height);
        }
      } else {
        setStatus('업로드 실패: ' + j.error);
      }
    } catch(e) { setStatus('업로드 에러'); }
    mmdUpload.value = '';
  };
  document.body.appendChild(mmdUpload);
  // Hotkey: press U to upload MMD
  document.addEventListener('keydown', (e) => {
    if (e.key === 'u' || e.key === 'U') mmdUpload.click();
  });

  // ── flip button ──
  $('flipBtn').onclick = () => {
    flipX = !flipX;
    $('flipBtn').style.background = flipX ? '#4a6cf7' : '#555';
  };

  // ── overlay toggle ──
  $('overlayBtn').onclick = () => {
    overlayShow = !overlayShow;
    $('overlayBtn').style.background = overlayShow ? '#4a6cf7' : '#555';
  };
  // ── VTS ──
  $('vtsBtn').onclick = () => {
    vtsConnect();
    $('vtsBtn').textContent = vtsAuthed ? 'VTS ✅' : 'VTS...';
  };

  // ── face toggle ──
  $('faceToggle').onclick = () => {
    faceOn = !faceOn;
    $('faceToggle').style.background = faceOn ? '#4a6cf7' : '#555';
  };
  // ── hand toggle ──
  $('handToggle').onclick = () => {
    handOn = !handOn;
    $('handToggle').style.background = handOn ? '#4a6cf7' : '#555';
  };
  // ── camera toggle ──
  const SMOOTH = 0.25;
  const boxToggle = $('boxToggle');
  const camBox = $('camBox');

  boxToggle.onclick = () => {
    boxVisible = !boxVisible;
    camBox.style.display = boxVisible ? 'block' : 'none';
    boxToggle.textContent = boxVisible ? '박스 OFF' : '박스 ON';
  };

  camBtn.onclick = async () => {
    if (stream) {
      stream.getTracks().forEach(t=>t.stop());
      stream = null;
      camBox.style.display = 'none';
      boxToggle.style.display = 'none';
      camBtn.textContent = 'CAM ON';
      headX = 0; headY = 0;
      setStatus('준비 완료');
      return;
    }
    if (!navigator.mediaDevices) return setError('HTTPS 필요 (cloudflare tunnel 사용)');
    setStatus('카메라 권한 요청...');
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { width:640, height:480, facingMode:'user' }
      });
      const v = $('cam');
      v.srcObject = stream;
      await v.play();
      camBox.style.display = 'block';
      boxToggle.style.display = 'block';
      boxVisible = true;
      boxToggle.textContent = '박스 OFF';
      camBtn.textContent = 'CAM OFF';
      setStatus('트래킹 시작...');

      const ov = $('ov'), oc = ov.getContext('2d', {willReadFrequently: false});
      const CW = 640, CH = 480;
      ov.width = CW; ov.height = CH;
      // load hand texture for overlay
      const handTex = new Image();
      handTex.onload = () => { handwearImg = handTex; };
      handTex.src = '/textures/20250913_handwear.webp';
      // auto-calibration: track hand size min/max for adaptive normalization
      let calHandMin = 0.08, calHandMax = 0.35;
      let calSamples = 0, calOpen = 0;
      let tracking = false, frameCount = 0, lastHandResult = null, smoothHand = [], handChanged = false;
      let armDecayL = { open:0, wx:0, wy:0 }, armDecayR = { open:0, wx:0, wy:0 };
      let lastFaceLM = null;
      const isMobile = /Mobi|Android/i.test(navigator.userAgent);
      let tabHidden = false;
      document.addEventListener('visibilitychange', () => { tabHidden = document.hidden; });

      function loop() {
        try {
          if (tabHidden) { requestAnimationFrame(loop); return; }
          if (v.readyState >= 2) {
            // always show video feed
            oc.clearRect(0, 0, CW, CH);
            oc.drawImage(v, 0, 0, CW, CH);
            // ── face (every 6 frames, ~10fps) ──
            let faceResult = null;
            if (faceOn) {
              const fr = faceLandmarker.detectForVideo(v, performance.now() + 0.1);
              if (fr.faceLandmarks && fr.faceLandmarks.length > 0) {
                faceResult = fr;
                lastFaceLM = fr.faceLandmarks[0];
              }
            }
            // draw face overlay from cache every frame
            if (faceOn && overlayShow && lastFaceLM) {
              const lm = lastFaceLM;
              oc.fillStyle = 'rgba(0,0,0,0.25)';
              oc.fillRect(0, 0, CW, CH);
              oc.fillStyle = '#0f0';
              for (let i = 0; i < lm.length; i++) { oc.beginPath(); oc.arc(lm[i].x*CW, lm[i].y*CH, 2, 0, Math.PI*2); oc.fill(); }
            }
            // ── hand: separate timestamp from face ──
            if (handOn) {
              const hr = handLandmarker.detectForVideo(v, performance.now());
              const newVal = (hr && hr.landmarks && hr.landmarks.length > 0 &&
                hr.handednesses?.length > 0 &&
                hr.handednesses.some((h, i) => h[0]?.score > 0.6)) ? hr : null;
              if (newVal) {
                handLostFrames = 0;
                lastHandResult = newVal;
                if (smoothHand.length !== newVal.landmarks.length) {
                  smoothHand = newVal.landmarks.map(hl => hl.map(l => ({x: l.x, y: l.y})));
                }
                handChanged = true;
              } else {
                lastHandResult = null;
                smoothHand = [];
              }
            } else {
              lastHandResult = null;
              smoothHand = [];
            }
            frameCount++;
            // lerp smoothHand toward lastHandResult every frame
            if (lastHandResult) {
              for (let h = 0; h < lastHandResult.landmarks.length; h++) {
                const raw = lastHandResult.landmarks[h];
                // ensure smoothHand[h] exists
                if (!smoothHand[h]) { smoothHand[h] = raw.map(l => ({x:l.x,y:l.y})); continue; }
                for (let i = 0; i < raw.length; i++) {
                  if (!smoothHand[h][i]) { smoothHand[h][i] = {x:raw[i].x,y:raw[i].y}; continue; }
                  smoothHand[h][i].x += (raw[i].x - smoothHand[h][i].x) * 0.85;
                  smoothHand[h][i].y += (raw[i].y - smoothHand[h][i].y) * 0.85;
                }
              }
            }
            handData = [];
            const HCONN = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
            // compute face bounding box to reject hands inside face area
            let faceBox = null;
            const faceLm = faceResult?.faceLandmarks?.[0] || lastFaceLM;
            if (faceLm) {
              const lm = faceLm;
              let minX=1, minY=1, maxX=0, maxY=0;
              for (let i=0;i<lm.length;i++) {
                if (lm[i].x<minX) minX=lm[i].x;
                if (lm[i].y<minY) minY=lm[i].y;
                if (lm[i].x>maxX) maxX=lm[i].x;
                if (lm[i].y>maxY) maxY=lm[i].y;
              }
              const padX = (maxX-minX)*0.15, padY = (maxY-minY)*0.15;
              faceBox = {x1:minX-padX, y1:minY-padY, x2:maxX+padX, y2:maxY+padY};
            }
            if (smoothHand.length > 0) {
              for (let h = 0; h < smoothHand.length; h++) {
                const hl = smoothHand[h];
                // reject if wrist (landmark 0) is inside face box
                if (faceBox && hl[0].x >= faceBox.x1 && hl[0].x <= faceBox.x2 &&
                    hl[0].y >= faceBox.y1 && hl[0].y <= faceBox.y2) continue;
                const wlm = lastHandResult?.worldLandmarks?.[h];
                handData.push({
                  landmarks: hl,
                  worldLandmarks: wlm || null,
                  handedness: lastHandResult?.handednesses?.[h]?.[0]?.categoryName || '',
                  score: lastHandResult?.handednesses?.[h]?.[0]?.score || 0.7
                });
              }
            }
            // draw hand overlay — only if handData has content
            if (overlayShow && handData.length > 0) {
              for (let h = 0; h < handData.length; h++) {
                const hl = handData[h].landmarks;
                const col = h === 0 ? '255,255,0' : '0,255,255';
                // skeleton
                oc.strokeStyle = `rgba(${col},0.4)`; oc.lineWidth = 2; oc.beginPath();
                for (const [a,b] of HCONN) { oc.moveTo(hl[a].x*CW, hl[a].y*CH); oc.lineTo(hl[b].x*CW, hl[b].y*CH); }
                oc.stroke();
                oc.fillStyle = `rgb(${col})`;
                for (let i = 0; i < hl.length; i++) { oc.beginPath(); oc.arc(hl[i].x*CW, hl[i].y*CH, 3, 0, Math.PI*2); oc.fill(); }
                // hand texture overlay
                if (handwearImg) {
                  const wrist = hl[0], midMcp = hl[9], midTip = hl[12];
                  if (wrist && midMcp) {
                    const wx = wrist.x * CW, wy = wrist.y * CH;
                    const mx = midMcp.x * CW, my = midMcp.y * CH;
                    const angle = Math.atan2(my - wy, mx - wx);
                    let handSize = 160;
                    if (midTip) { const tx = midTip.x * CW, ty = midTip.y * CH; handSize = Math.hypot(tx - wx, ty - wy) * 2.0; }
                    oc.save();
                    oc.translate(wx, wy);
                    oc.rotate(angle);
                    const scale = handSize / handwearImg.width;
                    const sw = handwearImg.width * scale, sh = handwearImg.height * scale;
                    oc.globalAlpha = 0.85;
                    oc.drawImage(handwearImg, -sw/2, -sh/2, sw, sh);
                    oc.restore();
                  }
                }
              }
            }
            // ── finger curl helper (3D wrist-to-tip ratio, rotation-invariant) ──
            function fingerCurlAngle(worldHl, fi) {
              // fi=0 thumb..4 pinky. Uses 3D worldLandmarks (z = perpendicular to palm)
              if (!worldHl) return 0.5;
              const tips = [4,8,12,16,20], mcps = [2,5,9,13,17];
              const tip = worldHl[tips[fi]], mcp = worldHl[mcps[fi]], w = worldHl[0], midMcp = worldHl[9];
              if (!tip || !mcp || !w || !midMcp) return 0.5;
              // 3D distance from fingertip to MCP
              const td = Math.hypot(tip.x-mcp.x, tip.y-mcp.y, tip.z-mcp.z);
              // fixed hand size: wrist to middle MCP (landmark 9) — same for all fingers
              const hs = Math.hypot(midMcp.x-w.x, midMcp.y-w.y, midMcp.z-w.z) || 0.001;
              const ratio = td / hs;
              // per-finger normalization: each finger has different length/ratio range
              const offsets = [0.15, 0.3, 0.3, 0.25, 0.15];
              const ranges  = [0.3,  0.5, 0.5, 0.45, 0.4];
              let curl = 1 - Math.min(1, Math.max(0, (ratio - offsets[fi]) / ranges[fi]));
              if (fi === 0) curl = Math.min(1, curl * 2.5); // thumb gain
              return Math.min(1, Math.max(0, curl));
            }
            // ── arm from hand (with auto-calibration + decay) ──
            if (handData.length > 0) {
              armL.open = 0; armR.open = 0; armL.wx = 0; armR.wx = 0; armL.wy = 0; armR.wy = 0;
              for (const hd of handData) {
                const hl = hd.landmarks, w = hl[0], wlm = hd.worldLandmarks;
              // hand open: avg distance wrist→5 fingertips (3D world = rotation invariant)
              let d = 0;
              if (wlm) {
                for (const i of [4,8,12,16,20]) d += Math.hypot(wlm[i].x-wlm[0].x, wlm[i].y-wlm[0].y, wlm[i].z-wlm[0].z);
              } else {
                for (const i of [4,8,12,16,20]) d += Math.hypot(hl[i].x-w.x, hl[i].y-w.y);
              }
              d = d / 5; // 0~~0.1
              // auto-calibrate: expand range as user opens/closes hand
              calSamples++;
              if (d < calHandMin) calHandMin = d;
              if (d > calHandMax) calHandMax = d;
              // converge slowly after enough samples
              if (calSamples > 30) {
                calHandMin *= 0.995; calHandMax *= 1.005; // slow release
              }
              const range = Math.max(0.02, calHandMax - calHandMin);
              const open = Math.min(1, Math.max(0, (d - calHandMin) / range));
              const wx = (w.x - 0.5) * 2;  // -1..1
              const wy = (0.5 - w.y) * 2;  // -1..1 up=+1
              // x<0.5: left of frame = model's right arm (our left)
              const isRight = hdIsRight(hd, flipX);
              if (isRight) { armR.open = open; armR.wx = wx; armR.wy = wy; }
              else { armL.open = open; armL.wx = wx; armL.wy = wy; }
            }
            } else {
              // hand lost — decay toward 0
              const decay = 0.92;
              for (const arm of [armL, armR]) {
                arm.open *= decay; arm.wx *= decay; arm.wy *= decay;
                if (Math.abs(arm.open) < 0.001) arm.open = 0;
                if (Math.abs(arm.wx) < 0.001) arm.wx = 0;
                if (Math.abs(arm.wy) < 0.001) arm.wy = 0;
              }
            }
            // ── hand tracking mode toggle (persist between frames) ──
            const pi15 = currentModel?._paramIdx?.Param15;
            const pi21 = currentModel?._paramIdx?.Param21;
            let handTrackR = 0, handTrackL = 0;
            for (const hd of handData) {
              const isRight = hdIsRight(hd, flipX);
              if (isRight) handTrackR = 1; else handTrackL = 1;
            }
            if (pi15 >= 0) currentModel.internalModel.coreModel._model.parameters.values[pi15] = handTrackR * 30;
            if (pi21 >= 0) currentModel.internalModel.coreModel._model.parameters.values[pi21] = handTrackL * 30;
            // ── helper: isRight with side-view fallback ──
            function hdIsRight(hd, flip) {
              const w = hd.landmarks[0];
              // always use x-position - handedness unreliable from pinky side
              return (w.x > 0.5) === flip;
            }
            function hdPrefix(hd, flip) {
              const w = hd.landmarks[0];
              // finger prefix opposite: hand position vs arm assignment
              return (w.x > 0.5) !== flip ? 'HandRight' : 'HandLeft';
            }
            // ── VTS inject ──
            if (vtsAuthed && handData.length > 0) {
              const vtsParams = [];
              for (const hd of handData) {
                const hl = hd.landmarks, w = hl[0];
                const isRight = hdIsRight(hd, flipX);
                const side = isRight ? 'Right' : 'Left';
                const wx = (w.x - 0.5) * 2, wy = (0.5 - w.y) * 2;
                const open = isRight ? armR.open : armL.open;
                vtsParams.push({id: 'Hand'+side+'AngleZ', value: wx * 30});
                vtsParams.push({id: 'Hand'+side+'AngleX', value: wy * 30});
                vtsParams.push({id: side==='Right'?'handRightOpen':'handLeftOpen', value: open * 60 - 30});
                vtsParams.push({id: 'Hand'+side+'PositionX', value: wx * 0.5});
                vtsParams.push({id: 'Hand'+side+'PositionY', value: wy * 0.5});
                // confidence blend: side view → use arm open as fallback
                const blend = Math.min(1, Math.max(0, (hd.score - 0.4) / 0.3));
                for (let fi = 0; fi < 5; fi++) {
                  const fn = ['_1_Thumb','_2_Index','_3_Middle','_4_Ring','_5_Pinky'][fi];
                  const flex = fingerCurlAngle(hd.worldLandmarks, fi);
                  const fingerVal = flex * 60 - 30;
                  const fallbackVal = open * 60 - 30;
                  vtsParams.push({id: 'Hand'+side+'Finger'+fn, value: fingerVal * blend + fallbackVal * (1 - blend)});
                }
              }
              vtsInject(vtsParams);
            }
            // ── finger tracking ──
            const pi = currentModel?._paramIdx;
            if (pi) {
              const pv = currentModel.internalModel.coreModel._model.parameters.values;
              const fingerTips = [4, 8, 12, 16, 20];
              const fingerNames = ['_1_Thumb', '_2_Index', '_3_Middle', '_4_Ring', '_5_Pinky'];
              for (const hd of handData) {
                const hl = hd.landmarks, w = hl[0];
                const prefix = hdPrefix(hd, flipX);
                const isRight = hdIsRight(hd, flipX);
                const open = isRight ? armR.open : armL.open;
                // confidence blend: side view → use arm open as fallback
                const blend = Math.min(1, Math.max(0, (hd.score - 0.4) / 0.3));
                for (let fi = 0; fi < 5; fi++) {
                  const fid = prefix + 'Finger' + fingerNames[fi];
                  if (pi[fid] >= 0) {
                    const flex = fingerCurlAngle(hd.worldLandmarks, fi);
                    pv[pi[fid]] = (flex * 60 - 30) * blend + (open * 60 - 30) * (1 - blend);
                  }
                }
              }
            }
            // ── wrist rotation from hand roll ──
            if (pi && pi.Param18 >= 0) {
              const pv = currentModel.internalModel.coreModel._model.parameters.values;
              for (const hd of handData) {
                if (!hdIsRight(hd, flipX)) continue;
                const raw = lastHandResult?.landmarks?.[handData.indexOf(hd)];
                if (!raw) continue;
                const roll = Math.atan2(raw[17].y - raw[5].y, raw[17].x - raw[5].x);
                pv[pi.Param18] = roll * 20;
              }
            }
            // ── universal hand-to-arm mapping (Huohuo Chinese etc) ──
            if (pi) {
              const pv = currentModel.internalModel.coreModel._model.parameters.values;
              for (const hd of handData) {
                const hl = hd.landmarks, w = hl[0];
                const isRight = hdIsRight(hd, flipX);
                const wx = (w.x - 0.5) * 2;
                const wy = (0.5 - w.y) * 2;
                // Huohuo/Fern: Param95=手, Param124=抬手, Param7/8/9=肩膀XYZ, Param113/114=手旋转, Param112=胳膊旋转, Fern: Param29/30/31=手臂1~3
                if (pi['Param95'] >= 0) pv[pi['Param95']] = (isRight ? armR.open : armL.open) * 30;
                if (pi['Param124'] >= 0) pv[pi['Param124']] = Math.max(0, (0.5 - wy)) * 30;
                if (pi['Param91'] >= 0) pv[pi['Param91']] = flipX ? 30 : 0;
                if (pi['Param7'] >= 0) pv[pi['Param7']] = wx * 15;
                if (pi['Param8'] >= 0) pv[pi['Param8']] = wy * 15;
                if (pi['Param113'] >= 0 && !isRight) pv[pi['Param113']] = wx * 30;
                if (pi['Param114'] >= 0 && isRight) pv[pi['Param114']] = wx * 30;
                if (pi['Param112'] >= 0) pv[pi['Param112']] = (isRight ? 1:-1) * wx * 20;
                if (pi['Param29'] >= 0) pv[pi['Param29']] = (isRight ? 1:-1) * wx * 20;
                if (pi['Param30'] >= 0) pv[pi['Param30']] = wy * 20;
                if (pi['Param31'] >= 0) pv[pi['Param31']] = (isRight ? armR.open : armL.open) * 30;
              }
            }
            // ── face tracking data ──
            let handsOff = 1;
            if (handData.length > 0) {
              for (const hd of handData) {
                const w = hd.landmarks[0];
                if (w.x > 0.2 && w.x < 0.8 && w.y > 0.05 && w.y < 0.55) { handsOff = 0; break; }
              }
            }
            if (faceResult && faceResult.faceLandmarks && faceResult.faceLandmarks.length > 0) {
              const lm = faceResult.faceLandmarks[0];

              if (!tracking) { tracking = true; setStatus('트래킹 중'); }

              // nose=1, left ear=234, right ear=454, chin=152, brow=10, noseBridge=168
              const nose = lm[1], lEar = lm[234], rEar = lm[454];
              const chin = lm[152], brow = lm[10], noseBridge = lm[168];

              // yaw: nose position relative to ears
              const faceW = Math.max(0.05, rEar.x - lEar.x);
              const yawRaw = ((nose.x - (lEar.x + rEar.x)/2) / faceW) * 2;

              // pitch: nose position relative to noseBridge (stable reference)
              const faceH = Math.max(0.05, chin.y - noseBridge.y);
              const pitchRaw = (0.32 - (nose.y - noseBridge.y) / faceH) * 6;

              // clamp
              const yawClamp = Math.max(-1, Math.min(1, yawRaw));
              const pitchClamp = Math.max(-1, Math.min(1, pitchRaw));

              // smooth
              const smoothFactor = SMOOTH * (handsOff > 0 ? 1 : 0.1);
              rawX += (yawClamp - rawX) * smoothFactor;
              rawY += (pitchClamp - rawY) * smoothFactor;

              headX = flipX ? -rawX : rawX;
              headY = rawY;
              // feed face data to MMD
              window.__mmdFace = { yaw: headX * 0.3, pitch: -headY * 0.3 };

              // ── expression tracking ──
              const mouthDist = Math.abs(lm[13].y - lm[14].y);
              const mOpen = Math.min(1, Math.max(0, (mouthDist / faceH - 0.025) * 30));
              mouthOpen = mOpen < 0.1 ? 0 : mOpen;

              const lEyeH = Math.abs(lm[159].y - lm[145].y) / faceH * 10;
              const rEyeH = Math.abs(lm[386].y - lm[374].y) / faceH * 10;
              eyeLOpen = Math.min(1, Math.max(0.05, lEyeH));
              eyeROpen = Math.min(1, Math.max(0.05, rEyeH));

              setStatus('X:'+Math.round(rawX*100)+' Y:'+Math.round(rawY*100)+' 손:'+handData.length);

            } else if (handData.length > 0 && !tracking) {
              tracking = true;
              setStatus('트래킹 중');

            } else if (faceResult && tracking) {
              tracking = false;
              setStatus('얼굴 감지 안 됨');
            }
          }
        } catch(e) {}
        requestAnimationFrame(loop);
      }
      loop();
    } catch(err) {
      setError('카메라: '+err.message);
    }
  };
}

// ── Voice Changer ──
(function(){
  const micBtn = document.getElementById('micBtn');
  const voiceSel = document.getElementById('voiceSel');
  const waveCanvas = document.getElementById('waveCanvas');
  const volSlider = document.getElementById('volSlider');
  const volLabel = document.getElementById('volLabel');
  let audioCtx, source, processor, stream, gainNode, analyser;
  let micOn = false;
  let waveAnimId = null;
  // 20 female voice presets (pitch shift semitones)
  const VOICES = [];
  for (let i = 0; i < 20; i++) {
    const pitch = 8 + i * 0.316; // 8.0 ~ 14.0 semitones
    VOICES.push({ label: `여음${i+1}`, pitch });
  }
  VOICES.forEach((v,i) => {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = v.label;
    voiceSel.appendChild(opt);
  });
  let currentVoice = 0;
  voiceSel.addEventListener('change', () => {
    currentVoice = parseInt(voiceSel.value);
    if (micOn) updatePitch();
  });
  function updatePitch() {
    const v = VOICES[currentVoice];
    const ratio = Math.pow(2, v.pitch / 12);
    if (processor) {
      processor._pitchRatio = ratio;
      processor._writePos = 0;
      processor._readPos = 0;
    }
  }
  // ── Waveform render ──
  function drawWave() {
    if (!micOn || !analyser) { waveAnimId = null; return; }
    const w = waveCanvas.width, h = waveCanvas.height;
    const ctx = waveCanvas.getContext('2d');
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(data);
    ctx.clearRect(0, 0, w, h);
    const mid = h / 2;
    // draw level bar (left side)
    const rms = data.reduce((s,v) => s + (v-128)*(v-128), 0) / data.length;
    const level = Math.min(1, Math.sqrt(rms) / 60);
    const barW = 4;
    ctx.fillStyle = level > 0.5 ? '#f44' : '#4a6cf7';
    ctx.fillRect(2, h - level * (h-4), barW, level * (h-4));
    // draw waveform line (right side)
    const step = Math.max(1, Math.floor(data.length / (w - barW - 4)));
    ctx.strokeStyle = '#8af';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    for (let x = barW + 4, i = 0; i < w - barW - 4; i++) {
      const idx = Math.min(i * step, data.length - 1);
      const y = mid + ((data[idx] - 128) / 128) * (mid - 2);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      x++;
    }
    ctx.stroke();
    waveAnimId = requestAnimationFrame(drawWave);
  }
  // ── Volume slider ──
  volSlider.addEventListener('input', () => {
    if (gainNode) gainNode.gain.value = parseInt(volSlider.value) / 100;
  });
  micBtn.addEventListener('click', async () => {
    if (micOn) {
      // turn off
      if (waveAnimId) { cancelAnimationFrame(waveAnimId); waveAnimId = null; }
      if (processor) { processor.disconnect(); processor = null; }
      if (analyser) { analyser.disconnect(); analyser = null; }
      if (gainNode) { gainNode.disconnect(); gainNode = null; }
      if (source) { source.disconnect(); source = null; }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      micOn = false;
      micBtn.style.background = '#555';
      micBtn.style.color = '#aaa';
      voiceSel.style.display = 'none';
      waveCanvas.style.display = 'none';
      volSlider.style.display = 'none';
      volLabel.style.display = 'none';
      window._setStatus('MIC 꺼짐');
    } else {
      // turn on
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        source = audioCtx.createMediaStreamSource(stream);
        // gain node for volume control
        gainNode = audioCtx.createGain();
        gainNode.gain.value = parseInt(volSlider.value) / 100;
        // analyser node for waveform
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 128;
        const bufferSize = 4096;
        processor = audioCtx.createScriptProcessor(bufferSize, 1, 1);
        processor._pitchRatio = Math.pow(2, VOICES[0].pitch / 12);
        processor._buffer = new Float32Array(bufferSize * 4);
        processor._writePos = 0;
        processor._readPos = 0;
        processor.onaudioprocess = function(e) {
          const input = e.inputBuffer.getChannelData(0);
          const output = e.outputBuffer.getChannelData(0);
          const ratio = this._pitchRatio;
          const buf = this._buffer;
          const bufLen = buf.length;
          let wp = this._writePos;
          let rp = this._readPos;
          for (let i = 0; i < input.length; i++) {
            buf[wp % bufLen] = input[i];
            wp++;
          }
          this._writePos = wp;
          for (let i = 0; i < output.length; i++) {
            let idx = rp;
            const frac = idx - Math.floor(idx);
            const i0 = Math.floor(idx) % bufLen;
            const i1 = (i0 + 1) % bufLen;
            output[i] = buf[i0] + (buf[i1] - buf[i0]) * frac;
            rp += ratio;
          }
          this._readPos = rp;
        };
        // chain: source -> gain -> analyser -> processor -> destination
        source.connect(gainNode);
        gainNode.connect(analyser);
        analyser.connect(processor);
        processor.connect(audioCtx.destination);
        micOn = true;
        micBtn.style.background = '#4a6cf7';
        micBtn.style.color = '#fff';
        voiceSel.style.display = '';
        waveCanvas.style.display = '';
        volSlider.style.display = '';
        volLabel.style.display = '';
        drawWave();
        window._setStatus('MIC 켜짐 - ' + VOICES[currentVoice].label);
      } catch(err) {
        window._setError('MIC: ' + err.message);
      }
    }
  });
})();
